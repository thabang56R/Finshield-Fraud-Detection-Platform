model:
  type: hybrid
  target: is_fraud
  test_size: 0.2
  random_state: 42
  model_name: xgboost

features:
  drop_columns:
    - transaction_id
    - customer_id
    - merchant_id
    - timestamp

  categorical:
    - currency
    - country
    - device_type
    - ip_address

  numeric:
    - amount
    - transaction_hour
    - transaction_dayofweek
    - is_weekend
    - is_night
    - customer_txn_count_1d
    - customer_txn_count_7d
    - customer_txn_count_30d
    - customer_amount_sum_1d
    - customer_amount_sum_7d
    - customer_amount_sum_30d
    - customer_prev_txn_count
    - customer_prev_amount_mean
    - customer_prev_amount_std
    - customer_amount_deviation
    - customer_amount_zscore
    - customer_minutes_since_prev_txn
    - merchant_prev_txn_count
    - merchant_prev_fraud_count
    - merchant_prev_fraud_rate
    - merchant_prev_amount_mean
    - is_foreign_transaction
    - is_high_amount
    - is_new_device_for_customer

training:
  baseline_model: logistic_regression
  primary_model: xgboost
  anomaly_model: isolation_forest
  probability_threshold: 0.5

anomaly:
  contamination: 0.15
  n_estimators: 200
  review_threshold: 0.65

hybrid:
  weights:
    rules: 0.30
    model: 0.45
    anomaly: 0.25

  thresholds:
    approve_max: 39
    review_max: 69
    block_min: 70

risk_bands:
  approve_max: 29
  review_max: 69
  block_min: 70
