app:
  name: FinShield Fraud Detection Platform
  env: development
  debug: true

api:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO

data:
  raw_file: data/raw/transactions_sample.csv
  target_column: is_fraud

experiment:
  random_state: 42
  mlflow_tracking_uri: file:./mlruns
  mlflow_experiment_name: finshield-fraud-detection

monitoring:
  audit_log_file: logs/prediction_audit.jsonl
  reports_dir: reports
